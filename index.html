<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title"       content="แจ้งซ่อมไฟฟ้าสาธารณะ">
  <meta property="og:description" content="เทศบาลตำบลบ้านยาง อ.เกษตรสมบูรณ์ จ.ชัยภูมิ">
  <meta property="og:image"       content="https://lh3.googleusercontent.com/d/14aIJCrUEJxix0Hbsyjgf9IsUrcfg6mbN">
  <meta property="og:type"        content="website">
  <title>แจ้งซ่อมไฟฟ้า — บ้านยาง</title>
  <link rel="icon" href="https://lh3.googleusercontent.com/d/14aIJCrUEJxix0Hbsyjgf9IsUrcfg6mbN" type="image/png">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#eef0f8;font-family:'Helvetica Neue',Arial,sans-serif;}
    #frame{display:none;position:fixed;inset:0;width:100%;height:100%;border:none;}
    #loader{position:fixed;inset:0;background:linear-gradient(160deg,#1a237e 0%,#3949ab 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;transition:opacity .4s;}
    #loader.hide{opacity:0;pointer-events:none;}
    .logo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.4);box-shadow:0 4px 20px rgba(0,0,0,0.3);}
    .title{color:#fff;font-size:20px;font-weight:700;text-align:center;line-height:1.4;}
    .sub{color:rgba(255,255,255,0.75);font-size:13px;text-align:center;}
    .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-txt{color:rgba(255,255,255,0.8);font-size:14px;}
    #fallback{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#1a237e 0%,#3949ab 100%);align-items:center;justify-content:center;padding:20px;}
    #fallback.show{display:flex;}
    .card{background:#fff;border-radius:20px;padding:36px 24px 28px;text-align:center;max-width:340px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.25);}
    .card .logo{margin-bottom:14px;}
    .card .title{color:#1a237e;font-size:19px;margin-bottom:6px;}
    .card .sub{color:#7986cb;margin-bottom:24px;line-height:1.6;}
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:52px;background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;text-decoration:none;cursor:pointer;box-shadow:0 4px 16px rgba(26,35,126,0.35);}
    .btn:active{opacity:.85;}
    .note{margin-top:14px;font-size:12px;color:#aaa;line-height:1.6;}
  </style>
</head>
<body>

<iframe id="frame"
  src="https://script.google.com/a/~/macros/s/AKfycbzZ0WVcoS1czIQjEQJx7q8PYwvthxTghNiFLQRN2aUgCkbyJqUGywsRuEyiKgyMpun7_A/exec"
  allow="camera; microphone"
  sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-top-navigation">
</iframe>

<div id="loader">
  <img class="logo" src="https://lh3.googleusercontent.com/d/14aIJCrUEJxix0Hbsyjgf9IsUrcfg6mbN" alt="โลโก้" onerror="this.style.display='none'">
  <div class="title">แจ้งซ่อมไฟฟ้าสาธารณะ</div>
  <div class="sub">เทศบาลตำบลบ้านยาง<br>อ.เกษตรสมบูรณ์ จ.ชัยภูมิ</div>
  <div class="spinner"></div>
  <div class="loading-txt">กำลังโหลด...</div>
</div>

<div id="fallback">
  <div class="card">
    <img class="logo" src="https://lh3.googleusercontent.com/d/14aIJCrUEJxix0Hbsyjgf9IsUrcfg6mbN" alt="โลโก้" onerror="this.style.display='none'">
    <div class="title">แจ้งซ่อมไฟฟ้าสาธารณะ</div>
    <div class="sub">เทศบาลตำบลบ้านยาง<br>อ.เกษตรสมบูรณ์ จ.ชัยภูมิ</div>
    <a class="btn" id="openBtn" href="https://script.google.com/a/~/macros/s/AKfycbzZ0WVcoS1czIQjEQJx7q8PYwvthxTghNiFLQRN2aUgCkbyJqUGywsRuEyiKgyMpun7_A/exec">
      📝 กดที่นี่เพื่อส่งเรื่องแจ้งซ่อม
    </a>
    <p class="note" id="fallbackNote">แอปที่ใช้อยู่ไม่รองรับการแสดงผลในหน้านี้<br>กรุณากดปุ่มด้านบนเพื่อเปิดฟอร์ม</p>
  </div>
</div>

<script>
  var TARGET='https://script.google.com/a/~/macros/s/AKfycbzZ0WVcoS1czIQjEQJx7q8PYwvthxTghNiFLQRN2aUgCkbyJqUGywsRuEyiKgyMpun7_A/exec';
  var ua=navigator.userAgent||'';
  var isLine=/Line\//i.test(ua);
  var isFB=/FB_IAB|FBAV|Instagram|Snapchat/i.test(ua);
  var isWV=/wv\b/i.test(ua);
  var loader=document.getElementById('loader');
  var frame=document.getElementById('frame');
  var fallback=document.getElementById('fallback');
  var note=document.getElementById('fallbackNote');

  if(isLine||isFB||isWV){
    loader.style.display='none';
    fallback.classList.add('show');
    if(isLine) note.textContent='กรุณากดปุ่มด้านบน แล้วเลือก "เปิดในเบราว์เซอร์" เพื่อประสบการณ์ที่ดีที่สุด';
  } else {
    frame.style.display='block';
    frame.addEventListener('load',function(){
      loader.classList.add('hide');
      setTimeout(function(){loader.style.display='none';},450);
    });
    setTimeout(function(){
      if(!loader.classList.contains('hide')){
        loader.style.display='none';
        fallback.classList.add('show');
        note.textContent='โหลดนานเกินไป กรุณากดปุ่มด้านบนเพื่อเปิดฟอร์มโดยตรง';
      }
    },12000);
  }
</script>
</body>
</html>
